services:
  youtube-subscriptions:
    image: ghcr.io/greg-hass/youtube-subscriptions:latest
    container_name: youtube-subscriptions
    ports:
      - "5173:8080"
    volumes:
      - ./server/data:/app/server/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SERVER_API_TOKEN=${SERVER_API_TOKEN:?Set SERVER_API_TOKEN to a long random value before starting the stack}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - FEED_REFRESH_ENABLED=true
      - FEED_REFRESH_INTERVAL_MINUTES=15
      - FEED_REFRESH_ON_START=true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
