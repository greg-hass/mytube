name: Docker Build & Push

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Type-check frontend
        run: npm run type-check

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend and server
        run: npm test -- --run

      - name: Audit frontend production dependencies
        run: npm audit --omit=dev

      - name: Audit server production dependencies
        working-directory: server
        run: npm audit --omit=dev

      - name: Build frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-smoke:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local only)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: youtube-subscriptions:smoke
          cache-from: type=gha

      - name: Boot container
        id: boot
        run: |
          docker run -d --rm \
            --name youtube-subscriptions-smoke \
            -p 8080:8080 \
            -e PORT=8080 \
            -e ALLOW_INSECURE_UNAUTHENTICATED_API=true \
            -e NODE_ENV=production \
            youtube-subscriptions:smoke

      - name: Wait for healthz
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:8080/api/healthz >/dev/null 2>&1; then
              echo "Container became healthy on attempt ${attempt}"
              exit 0
            fi
            sleep 2
          done
          echo "Container did not become healthy within 60 seconds"
          docker logs youtube-subscriptions-smoke
          exit 1

      - name: Probe healthz and version
        run: |
          healthz=$(curl -fsS http://localhost:8080/api/healthz)
          echo "healthz response: ${healthz}"
          test "${healthz}" = '{"status":"ok"}'

          version=$(curl -fsS http://localhost:8080/api/version)
          echo "version response: ${version}"
          echo "${version}" | grep -q '"name"'

      - name: Inspect container logs for errors
        if: always()
        run: |
          echo "::group::container logs"
          docker logs youtube-subscriptions-smoke || true
          echo "::endgroup::"

      - name: Stop and remove container
        if: always()
        run: docker rm -f youtube-subscriptions-smoke || true

